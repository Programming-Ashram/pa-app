<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>loop</title>
</head>
<body>
     
     <script>

          let fruits =["apple","banana","mango","pineapple","grapes"];

          for(let i = 0; i < fruits.length; i++){
               console.log(i);
          }

          for(let i in fruits){
               console.log(i)
          }

          let i = 0;
          while(i <=6){
               console.log(i);
               i++
          }

          for(let i of fruits){
               console.log(i)
          }

          // let y = 0;
          // do{
          //      console.log(y)
          //      i++;
          // }
          // while (y <=3);

          fruits.forEach(i => {
             console.log(i)
        });
     </script>
</body>
</html>
