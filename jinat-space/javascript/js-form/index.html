<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>form</title>
     <style>
          .login-panal{
               width: 350px;
               border: 2px solid rgb(10, 172, 235);
              margin: 100px auto;
              padding: 20px;
              border-radius: 30px;
          }
          .bg-1{
               background-image: url('https://img.freepik.com/premium-photo/colorful-contrast-seamless-blue-white-linear-gradient-background-eyecatching-website_983420-15811.jpg');
               background-repeat: no-repeat;
               background-size:cover;
          }
     </style>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" integrity="sha512-5Hs3dF2AEPkpNAR7UiOHba+lRSJNeM2ECkwxUIxC1Q/FLycGTbNapWXB4tP889k5T5Ju8fs4b1P5z/iB4nMfSQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-1">
     
     <form action="" class="login-panal">
          <div class="text-center">
               <h1 class="text-light">Login</h1>
          </div>
          <div>
               <input type="text" name="" id="" placeholder="Username" class="rounded-pill p-2 my-3 w-100">
          </div>
          <div>
               <input type="text" name="" id="" placeholder="Password" class="rounded-pill p-2 mb-3 w-100">
          </div>
          <div class="d-flex justify-content-between">
               <div class="d-flex align-items-center gap-2">
                    <input type="checkbox" name="" id="">
                    <label for="">Remember Me</label>
               </div>
               <div>
                    <a href="#" class="text-decoration-none">Forgot Password ?</a>
               </div>
               
          </div>
          <div class="mt-3">
               <button class="btn btn-info rounded-pill w-100">Login</button>
          </div>
          <div class="text-center my-3">
               <p>Don't have an account? <a href="#" class="text-decoration-none">Register</a> </p>
          </div>
     </form>

     <script src="./app.js"></script>
</body>
</html>
